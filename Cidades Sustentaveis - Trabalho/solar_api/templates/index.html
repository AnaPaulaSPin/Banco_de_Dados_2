<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Energia Solar</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .navbar-user {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.9rem;
            color: #fff;
        }
        .navbar-user span { opacity: 0.85; }
        .btn-logout {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: #fff;
            padding: 0.3rem 0.9rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .btn-logout:hover { background: rgba(255,255,255,0.35); }
        .perfil-badge {
            background: rgba(255,255,255,0.15);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">SolarTech Dashboard</div>
        <div class="navbar-user">
            <span id="nav-nome">...</span>
            <span class="perfil-badge" id="nav-perfil"></span>
            <button class="btn-logout" onclick="logout()">Sair</button>
        </div>
    </nav>

    <main class="container">
        <header class="dashboard-header">
            <h1>Resumo Operacional</h1>
            <div class="filter-group">
                <label for="cidadeSelect">Selecione a Cidade:</label>
                <select id="cidadeSelect">
                    <option value="">Carregando cidades...</option>
                </select>
            </div>
        </header>

        <section class="kpi-grid">
            <div class="kpi-card">
                <h3>Total de Unidades</h3>
                <p id="kpi-unidades">0</p>
            </div>
            <div class="kpi-card">
                <h3>Energia Gerada</h3>
                <p id="kpi-gerada">0 <small>kWh</small></p>
            </div>
            <div class="kpi-card economia">
                <h3>Economia Estimada</h3>
                <p id="kpi-economia">R$ 0,00</p>
            </div>
            <div class="kpi-card ambiental">
                <h3>CO₂ Evitado</h3>
                <p id="kpi-co2">0 <small>kg</small></p>
            </div>
        </section>

        <section class="table-section">
            <h2>Unidades Consumidoras</h2>
            <div class="table-responsive">
                <table id="unidadesTable">
                    <thead>
                        <tr>
                            <th>Responsável</th>
                            <th>Tipo</th>
                            <th>Bairro</th>
                            <th>Cidade</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
